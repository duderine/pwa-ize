<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PWA-ize</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get("url");
        const urlObj = targetUrl ? new URL(targetUrl) : null;
        const siteName = urlObj ? urlObj.hostname.replace('www.', '') : "PWA-ize";

        // Ajusta o título para o atalho ter o nome certo
        document.title = siteName;

        if (targetUrl) {
            // Manifesto Dinâmico Injetado
            const manifest = {
                "name": siteName,
                "short_name": siteName,
                "start_url": window.location.href, // O atalho abre aqui
                "display": "standalone",
                "scope": window.location.pathname, // Isola o escopo para não brigar com o index
                "display_override": ["window-controls-overlay", "standalone"],
                "background_color": "#000000",
                "theme_color": "#000000",
                "icons": [{
                    "src": `https://www.google.com/s2/favicons?sz=128&domain=${urlObj.hostname}`,
                    "sizes": "128x128",
                    "type": "image/png"
                }]
            };

            const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = URL.createObjectURL(blob);
            document.head.appendChild(link);

            // Se abrir como App instalado, pula a tela e vai pro site alvo
            if (window.matchMedia('(display-mode: standalone)').matches) {
                window.location.replace(targetUrl);
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
    <style>
        body { background: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { padding: 30px; border: 1px solid #222; border-radius: 20px; background: #0a0a0a; }
        .loader { border: 2px solid #333; border-top: 2px solid #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .step { font-size: 0.9em; color: #aaa; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <div id="info">Configurando atalho...</div>
        <div class="loader"></div>
        <div class="step">1. Abra o menu do navegador</div>
        <div class="step">2. Clique em <b>"Instalar aplicativo"</b></div>
        <div style="font-size: 0.7em; color: #444; margin-top: 20px;">Após instalar, use o ícone criado na tela inicial.</div>
    </div>
    <script>
        if (urlObj) document.getElementById('info').innerText = "Atalho para: " + siteName;
    </script>
</body>
</html>
