<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PWA-ize</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get("url");
        
        if (targetUrl) {
            const urlObj = new URL(targetUrl);
            const siteName = params.get("name") || urlObj.hostname.replace('www.', '');
            document.title = siteName;

            // MANIFESTO DINÂMICO
            const manifest = {
                "name": siteName,
                "short_name": siteName,
                "start_url": window.location.href, 
                "scope": "/", 
                "display": "standalone",
                "display_override": ["window-controls-overlay", "standalone"],
                "background_color": "#000000",
                "theme_color": "#000000",
                "icons": [{
                    "src": "https://www.google.com/s2/favicons?sz=128&domain=" + urlObj.hostname,
                    "sizes": "128x128",
                    "type": "image/png"
                }]
            };

            const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestURL;
            document.head.appendChild(link);

            // LOGICA DE REDIRECIONAMENTO
            // Se já abriu como PWA (standalone), vai direto pro alvo
            if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
                window.location.replace(targetUrl);
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { padding: 20px; border: 1px solid #333; border-radius: 12px; }
        .loader { border: 3px solid #333; border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .install-hint { color: #888; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div id="site-info">Preparando atalho...</div>
        <div class="loader"></div>
        <p class="install-hint">1. Clique nos três pontos (menu)<br>2. "Instalar Aplicativo/Adicionar à tela inicial"</p>
        <p style="font-size: 0.7em; color: #444;">Após instalar, abra pelo ícone na tela inicial.</p>
    </div>
    <script>
        if (targetUrl) {
            document.getElementById('site-info').innerText = "Atalho para: " + new URL(targetUrl).hostname;
        }
    </script>
</body>
</html>
