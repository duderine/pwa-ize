<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get("url");
        
        if (targetUrl) {
            const urlObj = new URL(targetUrl);
            const siteName = urlObj.hostname.replace('www.', '');
            document.title = siteName;

            // Criar o manifesto dinamicamente
            const myManifest = {
                "name": siteName,
                "short_name": siteName,
                "start_url": window.location.href, // Abre nesta página para fazer o redirect
                "scope": window.location.pathname, // ISOLA o PWA para não pegar o nome do repo
                "display": "standalone",
                "background_color": "#000000",
                "theme_color": "#000000",
                "icons": [{
                    "src": "https://www.google.com/s2/favicons?sz=128&domain=" + urlObj.hostname,
                    "sizes": "128x128",
                    "type": "image/png"
                }]
            };

            const stringManifest = JSON.stringify(myManifest);
            const blob = new Blob([stringManifest], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            
            const linkTag = document.createElement('link');
            linkTag.rel = 'manifest';
            linkTag.href = manifestURL;
            document.head.appendChild(linkTag);

            // Redireciona AUTOMATICAMENTE se já estiver instalado
            if (window.matchMedia('(display-mode: standalone)').matches) {
                window.location.replace(targetUrl);
            }
        }

        // Service Worker passivo para permitir instalação
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; text-align:center;">
    <div>
        <h2 id="name">A preparar...</h2>
        <p>1. Abra o menu do browser</p>
        <p>2. Clique em <b>"Instalar"</b></p>
    </div>
    <script>
        if (targetUrl) document.getElementById('name').innerText = new URL(targetUrl).hostname;
    </script>
</body>
</html>
