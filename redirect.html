<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>PWA-ize</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; color: #fff; font-family: sans-serif; }
        .loader { border: 3px solid #333; border-top: 3px solid #fff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader" class="loader"></div>
    <div id="message" style="display:none;"></div>

    <script>
        // Registra o SW para "validar" o PWA instalado
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get("url");

        if (targetUrl) {
            try {
                const finalUrl = new URL(targetUrl).href;
                // Timeout de 100ms para o navegador processar o estado standalone antes de sair
                setTimeout(() => {
                    window.location.replace(finalUrl);
                }, 100);
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('message').style.display = 'block';
                document.getElementById('message').innerText = "URL Inválida";
            }
        } else {
            window.location.replace('shortcuts.html');
        }
    </script>
</body>
</html>
